<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Regime Guard CMC Strategy logo</title>
  <desc id="desc">Abstract shield logo with candlestick bars and a signal wave.</desc>
  <defs>
    <linearGradient id="shieldFill" x1="104" y1="72" x2="408" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#272b33"/>
      <stop offset="1" stop-color="#111318"/>
    </linearGradient>
    <linearGradient id="goldFill" x1="144" y1="112" x2="368" y2="388" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd45a"/>
      <stop offset="1" stop-color="#f0b90b"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0b0d12" flood-opacity=".22"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="#f7f9fc"/>
