    />
  </g>

  <g stroke-linecap="round" stroke-linejoin="round">
    <path
      d="M160 309c28-46 62-66 102-60 32 5 52 27 90-25"
      fill="none"
      stroke="#28d7a0"
      stroke-width="18"
    />
    <path
      d="M352 224h-42l18-28"
