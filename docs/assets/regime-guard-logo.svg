    <rect x="241" y="158" width="30" height="156" rx="12"/>
    <rect x="298" y="184" width="30" height="130" rx="12"/>
  </g>

  <g stroke="#f0b90b" stroke-width="12" stroke-linecap="round">
    <path d="M199 178v-28"/>
    <path d="M199 338v24"/>
    <path d="M256 132v-30"/>
    <path d="M256 338v34"/>
    <path d="M313 160v-32"/>
